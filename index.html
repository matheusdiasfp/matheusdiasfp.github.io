<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #18181B;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .page {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .avatar-ring {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, #2563EB, #60A5FA);
    margin-bottom: 1.25rem;
    flex-shrink: 0;
  }

  .avatar-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #18181B;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .avatar-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .name {
    font-size: 22px;
    font-weight: 600;
    color: #F4F4F5;
    letter-spacing: -0.3px;
    margin-bottom: 0.4rem;
    text-align: center;
  }

  .tagline {
    font-size: 13px;
    font-weight: 400;
    color: #A1A1AA;
    text-align: center;
    letter-spacing: 0.5px;
    margin-bottom: 2rem;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 14px 20px;
    background: #27272A;
    border: 1px solid #3F3F46;
    border-radius: 12px;
    color: #E4E4E7;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.1s;
  }

  .link-btn:hover {
    background: #303036;
    border-color: #3B82F6;
    transform: translateY(-1px);
  }

  .link-btn:active {
    transform: translateY(0);
  }

  .link-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .link-icon svg { width: 20px; height: 20px; }

  .link-label {
    flex: 1;
    text-align: center;
  }

  .link-arrow {
    color: #3B82F6;
    font-size: 16px;
    width: 36px;
    text-align: right;
  }

  .footer {
    margin-top: 2rem;
    font-size: 11px;
    color: #71717A;
    text-align: center;
    letter-spacing: 0.5px;
  }
</style>
</head>
